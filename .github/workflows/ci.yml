name: CI

on:
  push:
    branches:
      - main
      - "agent/**"
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  swiftpm:
    name: SwiftPM
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build SwiftPM package
        run: swift build

      - name: Test SwiftPM package
        run: swift test

      - name: Check whitespace
        run: git diff --check

      - name: Test release packaging script
        run: scripts/test-package-release.sh

      - name: Package release ZIP
        if: startsWith(github.ref, 'refs/tags/')
        run: scripts/package-release.sh

      - name: Upload release ZIP
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: openrec-${{ github.ref_name }}
          path: dist/*.zip
          if-no-files-found: error
